<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            background-color: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-section {
            margin-bottom: 20px;
            padding: 15px;
            background-color: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--vscode-input-border);
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--vscode-button-hoverBackground);
        }

        button:active {
            opacity: 0.8;
        }

        .status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .status.hidden {
            display: none;
        }

        .status.info {
            background-color: var(--vscode-inputValidation-infoBackground);
            color: var(--vscode-inputValidation-infoForeground);
            border: 1px solid var(--vscode-inputValidation-infoBorder);
        }

        .status.error {
            background-color: var(--vscode-inputValidation-errorBackground);
            color: var(--vscode-inputValidation-errorForeground);
            border: 1px solid var(--vscode-inputValidation-errorBorder);
        }

        .status.success {
            background-color: var(--vscode-inputValidation-successBackground);
            color: var(--vscode-inputValidation-successForeground);
            border: 1px solid var(--vscode-inputValidation-successBorder);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--vscode-progressBar-background);
            border-radius: 2px;
            overflow: hidden;
            display: none;
            margin-bottom: 20px;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--vscode-progressBar-background);
            animation: progress 1.5s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 100%; }
        }

        .preview-section {
            display: none;
            margin-top: 30px;
        }

        .preview-section.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--vscode-editorGroup-border);
        }

        .tab-button {
            padding: 10px 15px;
            background: none;
            border: none;
            color: var(--vscode-tab-inactiveForeground);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-size: 13px;
        }

        .tab-button.active {
            color: var(--vscode-tab-activeForeground);
            border-bottom-color: var(--vscode-tab-activeBorder);
        }

        .tab-content {
            display: none;
            padding: 15px;
            background-color: var(--vscode-editor-background);
            border: 1px solid var(--vscode-editorGroup-border);
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .tab-content.active {
            display: block;
        }

        .download-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .download-buttons button {
            flex: 1;
            min-width: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Design Extractor</h1>

        <div class="input-section">
            <div class="input-group">
                <input
                    type="text"
                    id="urlInput"
                    placeholder="https://example.com"
                    value=""
                />
                <button id="extractBtn">Extract Design</button>
            </div>
        </div>

        <div id="status" class="status hidden"></div>
        <div id="progressBar" class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div id="previewSection" class="preview-section">
            <div class="tabs">
                <button class="tab-button active" data-tab="design-md">DESIGN.md</button>
                <button class="tab-button" data-tab="tailwind">Tailwind v4</button>
                <button class="tab-button" data-tab="css-vars">CSS Variables</button>
                <button class="tab-button" data-tab="dtcg">Design Tokens</button>
            </div>

            <div id="design-md" class="tab-content active"></div>
            <div id="tailwind" class="tab-content"></div>
            <div id="css-vars" class="tab-content"></div>
            <div id="dtcg" class="tab-content"></div>

            <div class="download-buttons">
                <button id="downloadDesignMd">⬇ DESIGN.md</button>
                <button id="downloadTailwind">⬇ Tailwind.css</button>
                <button id="downloadCssVars">⬇ Variables.css</button>
                <button id="downloadDtcg">⬇ Tokens.json</button>
            </div>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        // Tab switching
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                const tabName = button.getAttribute('data-tab');

                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                button.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // Extract button
        document.getElementById('extractBtn').addEventListener('click', () => {
            const url = document.getElementById('urlInput').value.trim();

            if (!url) {
                showStatus('error', 'Please enter a URL');
                return;
            }

            try {
                new URL(url);
            } catch {
                showStatus('error', 'Invalid URL format');
                return;
            }

            showStatus('info', 'Extracting design system...');
            document.getElementById('progressBar').classList.add('active');

            vscode.postMessage({
                command: 'extract',
                url: url
            });
        });

        // Handle messages from extension
        window.addEventListener('message', event => {
            const message = event.data;

            switch (message.command) {
                case 'extractComplete':
                    document.getElementById('progressBar').classList.remove('active');
                    showStatus('success', 'Design extraction complete!');
                    displayResults(message.results);
                    document.getElementById('previewSection').classList.add('active');
                    break;

                case 'extractError':
                    document.getElementById('progressBar').classList.remove('active');
                    showStatus('error', `Error: ${message.error}`);
                    break;

                case 'extractProgress':
                    showStatus('info', message.message);
                    break;
            }
        });

        function showStatus(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function displayResults(results) {
            document.getElementById('design-md').textContent = results.designMd || '';
            document.getElementById('tailwind').textContent = results.tailwind || '';
            document.getElementById('css-vars').textContent = results.cssVars || '';
            document.getElementById('dtcg').textContent = JSON.stringify(results.dtcg, null, 2) || '';
        }

        // Download buttons
        document.getElementById('downloadDesignMd').addEventListener('click', () => {
            downloadFile('design-md', 'DESIGN.md', 'text/markdown');
        });

        document.getElementById('downloadTailwind').addEventListener('click', () => {
            downloadFile('tailwind', 'tailwind.css', 'text/css');
        });

        document.getElementById('downloadCssVars').addEventListener('click', () => {
            downloadFile('css-vars', 'variables.css', 'text/css');
        });

        document.getElementById('downloadDtcg').addEventListener('click', () => {
            const content = document.getElementById('dtcg').textContent;
            downloadFile('dtcg', 'tokens.json', 'application/json', content);
        });

        function downloadFile(elementId, filename, mimeType, content = null) {
            const text = content || document.getElementById(elementId).textContent;
            const blob = new Blob([text], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
